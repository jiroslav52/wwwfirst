<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="shortcut icon" href="../images/photo_2026-03-12_09-08-04.ico" type="image/x-icon">
    <title>Профиль — PLANT</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">plant</a>
            <nav class="header-nav">
                <ul class="header-menu">
                    <li class="header-menu-item"><a href="catalog.html">Каталог</a></li>
                    <li class="header-menu-item"><a href="care.html">Советы по уходу</a></li>
                    <li class="header-menu-item"><a href="payment.html">Оплата и доставка</a></li>
                    <li class="header-menu-item"><a href="#footer">Контакты</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <a href="search.html" class="header-button" aria-label="Поиск">
                    <img class="header-icon search" src="../icons/search-alt-2-svgrepo-com.svg" alt="">
                </a>
                <a href="profile.html" class="header-button" aria-label="Профиль">
                    <img class="header-icon profile" src="../icons/profile-1335-svgrepo-com.svg" alt="">
                </a>
                <a href="trash.html" class="header-button" aria-label="Корзина">
                    <img class="header-icon basket" src="../icons/basket-alt-3-svgrepo-com.svg" alt="">
                </a>
            </div>
        </div>
    </header>


    <main class="info-page">
        <div class="container">
            <h1 class="info-title">Личный кабинет</h1>
            <p class="info-intro">Войдите в аккаунт, чтобы видеть историю заказов и сохранять любимые товары.</p>

            <form class="profile-form">
                <label class="profile-label" for="profile-email">E-mail</label>
                <input class="profile-input" id="profile-email" type="email" placeholder="your@email.ru" required>

                <label class="profile-label" for="profile-password">Пароль</label>
                <input class="profile-input" id="profile-password" type="password" placeholder="••••••••" required>

                <button class="profile-button" type="submit">Войти</button>
                <a href="#" class="profile-link">Регистрация</a>
            </form>
        </div>
    </main>


<footer class="footer" id="footer">
    <div class="container">
        <div class="footer-top">
            <nav class="footer-nav">
                <ul class="footer-menu">
                    <li class="footer-menu-item"><a href="catalog.html">Каталог</a></li>
                    <li class="footer-menu-item"><a href="care.html">Советы по уходу</a></li>
                    <li class="footer-menu-item"><a href="payment.html">Оплата и доставка</a></li>
                    <li class="footer-menu-item"><a href="#footer">Контакты</a></li>
                </ul>
            </nav>

            <div class="footer-socials">
                <a href="#" class="footer-social-link" aria-label="Instagram">
                    <img class="footer-social-icon footer-social-icon-inst" src="../icons/instagram.svg" alt="">
                </a>
                <a href="#" class="footer-social-link" aria-label="Одноклассники">
                    <img class="footer-social-icon footer-social-icon-ok" src="../icons/odnoklassniki.svg" alt="">
                </a>
                <a href="#" class="footer-social-link" aria-label="VK">
                    <img class="footer-social-icon footer-social-icon-vk" src="../icons/vk.svg" alt="">
                </a>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="footer-info">
                <a href="index.html" class="footer-logo">plant</a>
                <p class="footer-copy">© 2022 магазин цветов и растений PLANT</p>
            </div>

            <form class="footer-form">
                <label class="footer-label" for="email">E-mail</label>
                <input class="footer-input" id="email" type="email" placeholder="e-mail">
                <button class="footer-button" type="submit">Подписаться</button>
            </form>
        </div>
    </div>
</footer>
